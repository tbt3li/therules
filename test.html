<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Army Composition Calculator</title>
</head>
<body>

    <h1>Army Composition Calculator</h1>    
    <div class="input">
        <label for="leadership">Enter total leadership value:</label>
        <input type="number" id="leadership" name="leadership" min="1" placeholder="Enter number">
    </div>
    <div class="input">
        <label for="dominance">Enter total dominance value:</label>
        <input type="number" id="dominance" name="dominance" min="1" placeholder="Enter number">
    </div>

    <div class="unit-selector">
        <h3>Add Unit</h3>
        <div class="unit-lists">

            <div class="guard-list">
                <h4>Guards</h4>                
                <div id="guardList"></div>
                <button onclick="addGuard()">Add Guard</button>
            </div>

            <div class="specialist-list">
                <h4>Specialists</h4>                
                <div id="specialistList"></div>
                <button onclick="addSpecialist()">Add Specialist</button>
            </div>

            <div class="monsterlist-list">
                <h4>Monsters</h4>                
                <div id="monsterList"></div>
                <button onclick="addMonster()">Add Monster</button>
            </div>

        </div>
    </div>

    <button onclick="calculateArmy()">Calculate</button>

    <div id="output"></div>

    <table id="armyTable" style="display:none;">
        <thead>
            <tr>
                <th>Unit Type</th>
                <th>Count</th>
                <th>Total HP</th>
                <th>Total Strength</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        function calculateArmy() {
            const leadership = parseInt(document.getElementById('leadership').value);
            const dominance = parseInt(document.getElementById('dominance').value);

            if (isNaN(leadership) || leadership <= 0) {
                alert("Please enter a valid leadership value.");
                return;
            }

            if (isNaN(dominance) || dominance <= 0) {
                alert("Please enter a valid dominance value.");
                return;
            }
        }

        function displayResults(units, monsters, leadership, dominance) {
            const output = document.getElementById('output');

            output.innerHTML = `
                <p>Average HP per unit (leadership): ${Math.floor(units.reduce((sum, unit) => sum + unit.hpPerLead, 0) / units.length)}</p>
                <p>Average HP per monster squad: ${Math.floor(monsters.reduce((sum, monster) => sum + monster.hpPerDom, 0) / monsters.length)}</p>
                <p>Total number of troops: ${units.length + monsters.length}</p>
                <p>Total leadership used: ${leadership}</p>
                <p>Total dominance used: ${dominance}</p>
                <p>Expected leadership per unit: ${Math.floor(leadership / units.length)}</p>
                <p>Expected dominance per monster: ${Math.floor(dominance / monsters.length)}</p>
            `;
        }
    </script>

</body>
</html>
