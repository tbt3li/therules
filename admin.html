<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - The Family</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hidden { display: none !important; }
        .card-message { margin-bottom: 15px; transition: transform 0.2s; }
        .card-message:hover { transform: scale(1.01); }
    </style>
</head>
<body>

<div id="login-section" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="card-title text-center">Admin Login</h3>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="admin-password" class="form-control" placeholder="Enter Admin Key">
                    </div>
                    <button onclick="login()" class="btn btn-primary w-100">Login</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="admin-section" class="container mt-5 hidden">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Contact Messages</h2>
        <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
    
    <div id="messages-container">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
