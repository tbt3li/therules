<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicons -->
    <link href="assets/img/favicon.png" rel="icon">
    <title>Admin Login | The Family</title>
    <!-- Bootstrap for professional styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 15px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
        }

        .card-header {
            background: #212529;
            color: white;
            text-align: center;
            border-radius: 12px 12px 0 0 !important;
            padding: 20px;
        }

        .btn-primary {
            background-color: #212529;
            border: none;
            padding: 10px;
        }

        .btn-primary:hover {
            background-color: #343a40;
        }

        #error-msg {
            font-size: 0.9rem;
            display: none;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #212529;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <a href="https://thefamily.pages.dev" style="position:fixed; top:26px; left:66px; z-index:9999;">
      <img src="assets/img/logo.png" alt="Logo" style="height:80px; width:auto;">
    </a>
<div class="login-container">
    <div class="card">
        <div class="card-header">
            <h4 class="mb-0">Control Panel</h4>
            <small class="opacity-75">Authorized Person Only</small>
        </div>
        <div class="card-body p-4">
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                </div>
                
                <div id="error-msg" class="alert alert-danger mb-3"></div>

                <button type="submit" id="submitBtn" class="btn btn-primary w-100">
                    <span id="btnText">Login</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // UI Reset
        errorMsg.style.display = 'none';
        btnText.style.display = 'none';
        loader.style.display = 'block';
        submitBtn.disabled = true;

        const credentials = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('https://admin.t3li.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(credentials)
            });

            const data = await response.json();

            if (data.success) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = '/dashboard.html'; 
            } else {
                showError(data.message || 'Invalid username or password.');
            }
        } catch (err) {
            showError('Server error. Please try again later.');
        } finally {
            loader.style.display = 'none';
            btnText.style.display = 'block';
            submitBtn.disabled = false;
        }
    });

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
    }
</script>

</body>
</html>
