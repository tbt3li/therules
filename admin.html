<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Family | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #2c3e50; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-card { max-width: 400px; margin-top: 100px; border: none; border-radius: 15px; }
        .hidden { display: none !important; }
        .msg-card { border-left: 5px solid var(--primary-color); transition: 0.3s; }
        .msg-card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .badge-date { background-color: #95a5a6; font-size: 0.8rem; }
    </style>
</head>
<body>

<!-- Login Section -->
<div id="login-section" class="container d-flex justify-content-center">
    <div class="card login-card shadow-lg w-100 p-4">
        <h3 class="text-center mb-4">Admin Access</h3>
        <input type="password" id="admin-pass" class="form-control mb-3" placeholder="Enter Security Key">
        <button onclick="attemptLogin()" class="btn btn-dark w-100">Unlock Dashboard</button>
    </div>
</div>

<!-- Main Dashboard Section -->
<div id="admin-section" class="container mt-5 hidden">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Inbox</h2>
            <p class="text-muted">Manage your website inquiries</p>
        </div>
        <button onclick="logout()" class="btn btn-outline-secondary">Sign Out</button>
    </div>

    <div id="loader" class="text-center my-5">
        <div class="spinner-border text-dark" role="status"></div>
        <p>Fetching messages...</p>
    </div>

    <div id="messages-list" class="row">
        <!-- Messages will be injected here -->
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
